name: Deploy Dev

on:
  workflow_dispatch:  # push 트리거 제거, Actions 탭에서 수동 실행으로만 동작

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: dev  # workflow_dispatch는 브랜치 지정이 없으면 기본 브랜치를 체크아웃하므로, dev 브랜치를 명시적으로 고정

      - name: JDK 17 설치
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: build -x test

      - name: jar 파일 이름 변경
        run: mv build/libs/*.jar build/libs/app-dev.jar

      - name: jar 파일 EC2 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/app-dev.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      - name: EC2 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script_stop: false
          script: |
            echo "배포 중인 애플리케이션 종료 후 start-dev.sh 실행"
            cd /home/ubuntu/app
            chmod +x start-dev.sh
            ./start-dev.sh

            echo "**** 주기적으로 로그 정리 필요 ****"
            sleep 2
            echo "애플리케이션 실행 확인"
            ps -ef | grep "app-dev.jar" | grep -v grep || echo "Application failed to start ❌"

            sleep 15
            sudo lsof -i:8081 || echo "PORT 8081 is not in use ❌"

            echo "Deployment completed successfully 🚀"