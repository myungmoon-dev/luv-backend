name: Deploy

on:
  push:
    branches: [ release ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: JDK 17 설치
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: build -x test

      - name: jar 파일 EC2 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      - name: nginx 설정 파일 EC2 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "nginx/api.conf"
          target: "/home/ubuntu/app"
          strip_components: 1

      - name: EC2 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script_stop: false # 스크립트 실패해도 멈추지 말라는 옵션 (kill 안될 수도 있어서)
          script: |
            echo "nginx 설정 적용"
            sudo cp /home/ubuntu/app/api.conf /etc/nginx/sites-available/api.conf
            sudo ln -sf /etc/nginx/sites-available/api.conf /etc/nginx/sites-enabled/api.conf
            sudo nginx -t && sudo systemctl reload nginx

            echo "배포 중인 애플리케이션 종료 후 start.sh 실행"
            cd /home/ubuntu/app
            chmod +x start.sh
            ./start.sh

            echo "**** 주기적으로 로그 정리 필요 ****"            
            sleep 2
            echo "애플리케이션 실행 확인"
            ps -ef | grep "app.jar" | grep -v grep || echo "Application failed to start ❌"
            
            sleep 15
            sudo lsof -i:8080 || echo "PORT 8080 is not in use ❌"
            
            echo "Deployment completed successfully 🚀"