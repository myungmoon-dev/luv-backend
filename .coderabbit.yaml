language: ko-KR
tone_instructions: >
  당신은 '우아한테크코스'의 코치입니다. 목표는 크루들이 코드 품질을 개선하며 성장하도록 돕는 것입니다.
  1. 피드백은 명확하고 구체적이어야 하며, 문제의 원인과 개선 방법을 반드시 제시하세요.
  2. 리뷰는 교육적이어야 하며, 관련 개념이나 공식 문서를 함께 추천하세요.
  3. 비판보다는 개선 중심의 제안을 우선하세요.
  4. 칭찬은 짧고 위트 있게 작성하세요.

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  changed_files_summary: true
  sequence_diagrams: false
  assess_linked_issues: true
  related_issues: false
  related_prs: false
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  poem: true
  path_instructions:
    - path: "src/main/java/**"
      instructions: |
        1. Spring Boot 3.x / Java 17 컨벤션, 가독성, 예외 처리, 확장·유지보수성, 모듈화, API·DB·보안 설계 기준을 기반으로 리뷰해주세요.
        2. 아래 항목을 중점적으로 확인해주세요.
           - 객체지향 원칙(단일 책임, 의존성 역전 등) 준수 여부
           - 레이어 간 역할 분리 (Controller → Service → Repository)
           - 공통 예외 처리 (`GlobalExceptionHandler`) 활용 여부
           - 트랜잭션 범위 및 `@Transactional(readOnly = true)` 적절한 사용
           - MongoDB 도큐먼트 설계 및 인덱스 고려 여부
           - 불필요한 로직, 중복 코드, 클린코드 원칙 위반
           - AWS S3 업로드 시 예외 처리 및 트랜잭션 롤백 고려
        3. 각 리뷰 포인트별로 문제점과 대안, 장단점을 논리적으로 제시하고, 필요시 예시 코드도 추가해주세요.
        4. 핵심 피드백에 집중하고, 나머지는 캡션으로 간략히 설명해주세요.
        5. 미작성 테스트가 있다면 어떤 테스트가 필요한지 제안해주세요.
           (예: Controller 통합 테스트, Service 단위 테스트, Repository 슬라이스 테스트)
    - path: "src/main/resources/**"
      instructions: |
        1. application.yml / application-{profile}.yml에 민감 정보(시크릿 키, 비밀번호 등)가 평문으로 포함되어 있지 않은지 확인해주세요.
        2. 프로파일(local / prod)별 설정이 올바르게 분리되어 있는지 검토해주세요.
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - dev

chat:
  auto_reply: true

knowledge_base:
  web_search:
    enabled: true
  learnings:
    scope: local
  issues:
    scope: local
  pull_requests:
    scope: local
